<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Ideias Maravilha</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #1A0E07; color: #F5E8D7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    h1 { font-family: 'Cormorant Garamond', serif; }
    .card { background: rgba(255,255,255,.04); border: 1px solid rgba(212,168,85,.2); border-radius: 20px; padding: 40px; width: 100%; max-width: 560px; box-shadow: 0 24px 80px rgba(0,0,0,.6); }
    .logo { display: block; width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px; border: 2px solid rgba(212,168,85,.4); }
    .title { font-size: 34px; color: #D4A855; text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; color: rgba(245,232,215,.45); font-size: 14px; margin-bottom: 36px; }
    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(245,232,215,.45); margin-bottom: 8px; }
    input, select { width: 100%; padding: 13px 16px; background: rgba(255,255,255,.06); border: 1px solid rgba(212,168,85,.2); border-radius: 10px; color: #F5E8D7; font-size: 15px; font-family: 'Nunito', sans-serif; outline: none; transition: border-color .2s; margin-bottom: 20px; }
    input:focus, select:focus { border-color: rgba(212,168,85,.55); }
    select option { background: #2C1810; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #7B4A2D, #D4A855); color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; letter-spacing: .04em; transition: opacity .2s; }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .hint { font-size: 12px; color: rgba(245,232,215,.3); margin-top: -14px; margin-bottom: 18px; line-height: 1.6; }
    .dropzone { border: 2px dashed rgba(212,168,85,.35); border-radius: 14px; padding: 36px 24px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 20px; position: relative; }
    .dropzone:hover, .dropzone.over { border-color: rgba(212,168,85,.7); background: rgba(212,168,85,.06); }
    .dropzone input[type=file] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; margin: 0; padding: 0; border: none; }
    .dz-icon { font-size: 42px; margin-bottom: 10px; }
    .dz-text { color: rgba(245,232,215,.6); font-size: 15px; }
    .dz-sub  { color: rgba(245,232,215,.35); font-size: 13px; margin-top: 6px; }
    #preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 8px; margin-bottom: 20px; }
    #preview-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid rgba(212,168,85,.2); }
    .progress-wrap { background: rgba(255,255,255,.06); border-radius: 30px; overflow: hidden; height: 10px; margin-bottom: 10px; }
    .progress-bar  { height: 100%; background: linear-gradient(90deg, #7B4A2D, #D4A855); border-radius: 30px; transition: width .3s; width: 0%; }
    .msg { padding: 14px 18px; border-radius: 10px; font-size: 14px; margin-top: 16px; display: none; line-height: 1.6; }
    .msg.success { background: rgba(76,175,80,.15);  border: 1px solid rgba(76,175,80,.3);  color: #81C784; display: block; }
    .msg.error   { background: rgba(244,67,54,.12);  border: 1px solid rgba(244,67,54,.3);  color: #EF9A9A; display: block; }
    .screen { display: none; }
    .screen.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    .logout-btn { margin-top: 20px; background: transparent; border: none; color: rgba(245,232,215,.3); font-size: 13px; cursor: pointer; width: 100%; text-align: center; font-family: 'Nunito', sans-serif; }
  </style>
</head>
<body>
<div class="card">
  <img src="img/logo.jpg" alt="Logo" class="logo" />
  <h1 class="title">Ideias Maravilha</h1>
  <p class="subtitle">Painel de Administração</p>

  <!-- LOGIN -->
  <div class="screen active" id="screen-login">
    <label>Palavra-passe</label>
    <input type="password" id="pwd-input" placeholder="Palavra-passe…" />
    <button class="btn" onclick="doLogin()">Entrar →</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- UPLOAD -->
  <div class="screen" id="screen-upload">
    <p style="color:rgba(245,232,215,.45);font-size:14px;margin-bottom:28px;text-align:center">Escolha a categoria e adicione as fotos.</p>

    <label>Categoria</label>
    <select id="cat-select">
      <optgroup label="🪵 Madeira">
        <option value="img_Page2|natal|43">Natal</option>
        <option value="img_Page3|retratos|13">Porta Retratos</option>
        <option value="img_Page4|Letreiros|7">Letreiros Luminosos</option>
        <option value="img_Page5|casamento|50">Casamento / Batizado / Comunhões</option>
        <option value="img_Page9|chaves|27">Porta Chaves</option>
        <option value="img_Page10|Trofeus|28">Troféus e Medalhas</option>
        <option value="img_Page11|Candeeiros|22">Candeeiros</option>
        <option value="Page_12|pascoa|24">Páscoa e Padrinhos</option>
        <option value="Page_13|animais|30">Animais</option>
        <option value="Page_14|pais|27">Dia do Pai</option>
        <option value="Page_15|namorados|17">Dia dos Namorados</option>
        <option value="Page_16|escola|26">Escola / Finalistas</option>
      </optgroup>
      <optgroup label="💎 Epóxi">
        <option value="Page_17|cabelo|13">Cabelo, Dentinho, Gravidez…</option>
        <option value="Page_18|pascoa|11">Páscoa (Epóxi)</option>
        <option value="Page_19|joias|28">Jóias</option>
        <option value="Page_23|porte|9">Porta Chaves (Epóxi)</option>
        <option value="Page_20|presente|61">Presentes Personalizados</option>
        <option value="Page_21|pecas|15">Peças Únicas</option>
        <option value="Page_22|casamento|9">Casamento / Batizado (Epóxi)</option>
      </optgroup>
    </select>

    <label>Fotografias</label>
    <div class="dropzone" id="dropzone"
      ondragover="event.preventDefault();this.classList.add('over')"
      ondragleave="this.classList.remove('over')"
      ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
      <div class="dz-icon">📸</div>
      <div class="dz-text">Clique ou arraste as fotos para aqui</div>
      <div class="dz-sub">JPG, PNG, WEBP · Várias fotos de uma vez</div>
    </div>

    <div id="preview-grid"></div>

    <div id="progress-section" style="display:none">
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div id="progress-text" style="font-size:13px;color:rgba(245,232,215,.5);margin-bottom:16px;text-align:center"></div>
    </div>

    <button class="btn" id="upload-btn" onclick="doUpload()" disabled>Enviar fotos para o site</button>
    <div class="msg" id="upload-msg"></div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </div>
</div>

<script>
const REPO_OWNER = "Rafael-ma0508";
const REPO_NAME  = "Ideias-Maravilha";
const ADMIN_PASS = "marco"; 
const GH_TOKEN   = "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";

let selectedFiles = [];

document.getElementById("pwd-input").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

function doLogin() {
  const pwd = document.getElementById("pwd-input").value.trim();
  const msg = document.getElementById("login-msg");
  if (pwd !== ADMIN_PASS) {
    msg.textContent = "❌ Palavra-passe incorreta.";
    msg.className = "msg error"; return;
  }
  document.getElementById("screen-login").classList.remove("active");
  document.getElementById("screen-upload").classList.add("active");
}

function doLogout() {
  selectedFiles = [];
  document.getElementById("screen-upload").classList.remove("active");
  document.getElementById("screen-login").classList.add("active");
  document.getElementById("pwd-input").value = "";
  document.getElementById("preview-grid").innerHTML = "";
  document.getElementById("upload-btn").disabled = true;
  document.getElementById("upload-msg").className = "msg";
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById("dropzone").classList.remove("over");
  handleFiles(e.dataTransfer.files);
}

function handleFiles(files) {
  selectedFiles = Array.from(files).filter(f => f.type.startsWith("image/"));
  const grid = document.getElementById("preview-grid");
  grid.innerHTML = "";
  selectedFiles.forEach(f => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    grid.appendChild(img);
  });
  document.getElementById("upload-btn").disabled = selectedFiles.length === 0;
  document.getElementById("upload-msg").className = "msg";
}

async function doUpload() {
  if (!selectedFiles.length) return;
  const [folder, prefix, countStr] = document.getElementById("cat-select").value.split("|");
  let count = parseInt(countStr);
  const btn  = document.getElementById("upload-btn");
  const msg  = document.getElementById("upload-msg");
  const prog = document.getElementById("progress-section");
  const bar  = document.getElementById("progress-bar");
  const txt  = document.getElementById("progress-text");

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>A enviar…';
  prog.style.display = "block";
  msg.className = "msg";

  try {
    for (let i = 0; i < selectedFiles.length; i++) {
      const file  = selectedFiles[i];
      const ext   = (file.name.split(".").pop() || "jpg").toLowerCase();
      const name  = `${prefix}${count + i + 1}.${ext}`;
      txt.textContent = `A enviar ${i+1} de ${selectedFiles.length}: ${name}`;
      bar.style.width = `${Math.round((i / selectedFiles.length) * 88)}%`;
      await ghPut(`${folder}/${name}`, await toBase64(file), `Adicionar ${name}`);
    }

    const newTotal = count + selectedFiles.length;
    txt.textContent = "A atualizar o site…";
    await updateCount(folder, prefix, count, newTotal);

    bar.style.width = "100%";
    msg.textContent = `✅ ${selectedFiles.length} foto(s) adicionada(s)! O site atualiza em 1-2 minutos.`;
    msg.className = "msg success";

    const sel = document.getElementById("cat-select");
    const parts = sel.value.split("|");
    parts[2] = String(newTotal);
    sel.options[sel.selectedIndex].value = parts.join("|");

    selectedFiles = [];
    document.getElementById("preview-grid").innerHTML = "";
    document.getElementById("file-input").value = "";
  } catch(err) {
    msg.textContent = `❌ Erro: ${err.message}`;
    msg.className = "msg error";
    bar.style.width = "0%";
  }

  btn.disabled = false;
  btn.innerHTML = "Enviar fotos para o site";
}

async function ghPut(path, content, message) {
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: "PUT",
    headers: { Authorization: `Bearer ${GH_TOKEN}`, "Content-Type": "application/json" },
    body: JSON.stringify({ message, content }),
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || `HTTP ${res.status}`); }
  return res.json();
}

async function updateCount(folder, prefix, oldCount, newCount) {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${GH_TOKEN}` } });
  if (!res.ok) throw new Error("Não foi possível ler index.html");
  const data = await res.json();
  let html = decodeURIComponent(escape(atob(data.content.replace(/\n/g,""))));
  html = html.replace(
    new RegExp(`(folder:"${folder}"\\s*,\\s*prefix:"${prefix}"\\s*,\\s*count:)${oldCount}`, "g"),
    `$1${newCount}`
  );
  await fetch(url, {
    method: "PUT",
    headers: { Authorization: `Bearer ${GH_TOKEN}`, "Content-Type": "application/json" },
    body: JSON.stringify({ message: `Contagem ${folder}/${prefix} → ${newCount}`, content: btoa(unescape(encodeURIComponent(html))), sha: data.sha }),
  });
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
</script>

</body>
</html>
